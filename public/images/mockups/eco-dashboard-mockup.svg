<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="url(#paint0_linear)" />
  
  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="500" rx="12" fill="url(#paint1_linear)" />
  
  <!-- Sidebar Menu -->
  <rect x="20" y="90" width="160" height="40" rx="8" fill="#3B82F6" fill-opacity="0.2" />
  <circle cx="40" cy="110" r="8" fill="#3B82F6" />
  <rect x="56" y="105" width="80" height="10" rx="2" fill="#E5E7EB" />
  
  <rect x="20" y="140" width="160" height="40" rx="8" fill="transparent" />
  <circle cx="40" cy="160" r="8" fill="#9CA3AF" />
  <rect x="56" y="155" width="100" height="10" rx="2" fill="#9CA3AF" />
  
  <rect x="20" y="190" width="160" height="40" rx="8" fill="transparent" />
  <circle cx="40" cy="210" r="8" fill="#9CA3AF" />
  <rect x="56" y="205" width="60" height="10" rx="2" fill="#9CA3AF" />
  
  <rect x="20" y="240" width="160" height="40" rx="8" fill="transparent" />
  <circle cx="40" cy="260" r="8" fill="#9CA3AF" />
  <rect x="56" y="255" width="90" height="10" rx="2" fill="#9CA3AF" />
  
  <!-- Logo -->
  <text x="40" y="50" font-family="Arial" font-weight="bold" font-size="24" fill="url(#paint2_linear)">EcoTrack</text>
  
  <!-- Main Content -->
  <!-- Header -->
  <text x="220" y="50" font-family="Arial" font-weight="bold" font-size="24" fill="#F9FAFB">Dashboard</text>
  
  <!-- Stats Cards -->
  <rect x="220" y="70" width="170" height="100" rx="10" fill="url(#paint3_linear)" />
  <text x="240" y="100" font-family="Arial" font-size="14" fill="#D1D5DB">Total Carbon</text>
  <text x="240" y="130" font-family="Arial" font-weight="bold" font-size="24" fill="#F9FAFB">1,482 kg</text>
  <circle cx="350" cy="110" r="20" fill="#10B981" fill-opacity="0.2" />
  <path d="M345 110L350 115L355 105" stroke="#10B981" stroke-width="2" />
  
  <rect x="410" y="70" width="170" height="100" rx="10" fill="url(#paint4_linear)" />
  <text x="430" y="100" font-family="Arial" font-size="14" fill="#D1D5DB">Energy Usage</text>
  <text x="430" y="130" font-family="Arial" font-weight="bold" font-size="24" fill="#F9FAFB">342 kWh</text>
  <circle cx="540" cy="110" r="20" fill="#EF4444" fill-opacity="0.2" />
  <path d="M535 105L540 110L545 100" stroke="#EF4444" stroke-width="2" transform="rotate(180 540 105)" />
  
  <rect x="600" y="70" width="170" height="100" rx="10" fill="url(#paint5_linear)" />
  <text x="620" y="100" font-family="Arial" font-size="14" fill="#D1D5DB">Devices</text>
  <text x="620" y="130" font-family="Arial" font-weight="bold" font-size="24" fill="#F9FAFB">7 Active</text>
  <circle cx="730" cy="110" r="20" fill="#3B82F6" fill-opacity="0.2" />
  <rect x="725" y="105" width="10" height="10" rx="2" fill="#3B82F6" />
  
  <!-- Chart Area -->
  <rect x="220" y="190" width="550" height="290" rx="10" fill="url(#paint6_linear)" />
  
  <!-- Chart Title -->
  <text x="240" y="220" font-family="Arial" font-weight="bold" font-size="16" fill="#F9FAFB">Carbon Footprint (Last 6 Months)</text>
  
  <!-- Chart Legend -->
  <circle cx="240" cy="240" r="6" fill="#10B981" />
  <text x="255" y="245" font-family="Arial" font-size="12" fill="#D1D5DB">Your Footprint</text>
  <circle cx="350" cy="240" r="6" fill="#6B7280" />
  <text x="365" y="245" font-family="Arial" font-size="12" fill="#D1D5DB">Average</text>
  
  <!-- Chart Grid -->
  <line x1="240" y1="270" x2="750" y2="270" stroke="#374151" stroke-width="1" stroke-dasharray="4 4" />
  <line x1="240" y1="320" x2="750" y2="320" stroke="#374151" stroke-width="1" stroke-dasharray="4 4" />
  <line x1="240" y1="370" x2="750" y2="370" stroke="#374151" stroke-width="1" stroke-dasharray="4 4" />
  <line x1="240" y1="420" x2="750" y2="420" stroke="#374151" stroke-width="1" stroke-dasharray="4 4" />
  
  <!-- Chart Bars -->
  <rect x="270" y="370" width="30" height="50" rx="4" fill="#10B981" />
  <rect x="270" y="350" width="30" height="70" rx="4" fill="#6B7280" fill-opacity="0.3" />
  
  <rect x="350" y="340" width="30" height="80" rx="4" fill="#10B981" />
  <rect x="350" y="320" width="30" height="100" rx="4" fill="#6B7280" fill-opacity="0.3" />
  
  <rect x="430" y="360" width="30" height="60" rx="4" fill="#10B981" />
  <rect x="430" y="340" width="30" height="80" rx="4" fill="#6B7280" fill-opacity="0.3" />
  
  <rect x="510" y="320" width="30" height="100" rx="4" fill="#10B981" />
  <rect x="510" y="300" width="30" height="120" rx="4" fill="#6B7280" fill-opacity="0.3" />
  
  <rect x="590" y="300" width="30" height="120" rx="4" fill="#10B981" />
  <rect x="590" y="280" width="30" height="140" rx="4" fill="#6B7280" fill-opacity="0.3" />
  
  <rect x="670" y="280" width="30" height="140" rx="4" fill="#10B981" />
  <rect x="670" y="260" width="30" height="160" rx="4" fill="#6B7280" fill-opacity="0.3" />
  
  <!-- Chart X Axis Labels -->
  <text x="280" y="440" font-family="Arial" font-size="10" fill="#9CA3AF" text-anchor="middle">Nov</text>
  <text x="360" y="440" font-family="Arial" font-size="10" fill="#9CA3AF" text-anchor="middle">Dec</text>
  <text x="440" y="440" font-family="Arial" font-size="10" fill="#9CA3AF" text-anchor="middle">Jan</text>
  <text x="520" y="440" font-family="Arial" font-size="10" fill="#9CA3AF" text-anchor="middle">Feb</text>
  <text x="600" y="440" font-family="Arial" font-size="10" fill="#9CA3AF" text-anchor="middle">Mar</text>
  <text x="680" y="440" font-family="Arial" font-size="10" fill="#9CA3AF" text-anchor="middle">Apr</text>
  
  <!-- Chart Y Axis Labels -->
  <text x="230" y="270" font-family="Arial" font-size="10" fill="#9CA3AF" text-anchor="end">300</text>
  <text x="230" y="320" font-family="Arial" font-size="10" fill="#9CA3AF" text-anchor="end">200</text>
  <text x="230" y="370" font-family="Arial" font-size="10" fill="#9CA3AF" text-anchor="end">100</text>
  <text x="230" y="420" font-family="Arial" font-size="10" fill="#9CA3AF" text-anchor="end">0</text>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827" />
      <stop offset="1" stop-color="#1F2937" />
    </linearGradient>
    <linearGradient id="paint1_linear" x1="0" y1="0" x2="200" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1A" />
      <stop offset="1" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="paint2_linear" x1="40" y1="30" x2="130" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" />
      <stop offset="1" stop-color="#10B981" />
    </linearGradient>
    <linearGradient id="paint3_linear" x1="220" y1="70" x2="390" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#064E3B" stop-opacity="0.6" />
      <stop offset="1" stop-color="#065F46" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="paint4_linear" x1="410" y1="70" x2="580" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7F1D1D" stop-opacity="0.6" />
      <stop offset="1" stop-color="#991B1B" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="paint5_linear" x1="600" y1="70" x2="770" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E3A8A" stop-opacity="0.6" />
      <stop offset="1" stop-color="#1E40AF" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="paint6_linear" x1="220" y1="190" x2="770" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F2937" stop-opacity="0.8" />
      <stop offset="1" stop-color="#111827" stop-opacity="0.6" />
    </linearGradient>
  </defs>
</svg> 